apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gpu-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.2
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gpu-inference
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: gpu-inference-api
        static_configs:
          - targets: ["gpu-inference-api:8000"]
        metrics_path: /metrics
      - job_name: triton
        static_configs:
          - targets: ["triton:8003"]
        metrics_path: /metrics
      - job_name: dcgm-exporter
        static_configs:
          - targets: ["dcgm-exporter:9400"]
        metrics_path: /metrics
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gpu-inference
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP

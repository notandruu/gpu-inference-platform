apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gpu-inference-api
  namespace: gpu-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gpu-inference-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  # For Prometheus-based scaling (requires KEDA or prometheus-adapter):
  # - type: External
  #   external:
  #     metric:
  #       name: api_active_requests
  #       selector:
  #         matchLabels:
  #           app: gpu-inference-api
  #     target:
  #       type: AverageValue
  #       averageValue: "50"
